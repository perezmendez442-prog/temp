<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TempMail PRO ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{padding:20px;background:#111;border-bottom:1px solid #222}
h1{margin:0;font-size:22px}

.container{display:flex;height:100vh}
.left{width:30%;background:#151515;padding:10px;overflow:auto}
.right{flex:1;padding:15px;overflow:auto}

button{padding:10px;background:#0d6efd;border:none;color:white;cursor:pointer;margin:5px;width:100%}
button:hover{background:#0b5ed7}

.email-box{background:#222;padding:10px;margin:10px 0;border-radius:8px;word-break:break-all}

.mail{background:#1c1c1c;padding:10px;margin:10px 0;border-radius:8px}

input{width:100%;padding:10px;margin:5px 0;background:#222;border:none;color:white}

.small{font-size:12px;color:#aaa}

.stats{background:#222;padding:10px;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<header>
<h1>TempMail ULTRA PRO</h1>
</header>

<div class="container">

<div class="left">

<button onclick="createEmail()">+ Crear Email Temporal</button>
<button onclick="loadStats()">📊 Stats</button>
<button onclick="deleteEmail()">🗑 Eliminar Email</button>

<div class="email-box">
<div class="small">Email actual:</div>
<div id="email">None</div>
</div>

<input id="searchBox" placeholder="Buscar en inbox..." onkeyup="searchMessages()">

<div class="stats" id="stats"></div>

</div>

<div class="right">

<h2>Inbox</h2>
<div id="inbox"></div>

</div>

</div>

<script>

const API = "https://temp-2s98.onrender.com"

let currentEmail = ""
let interval = null

async function createEmail(){
  const res = await fetch(API + "/api/create", {method:"POST"})
  const data = await res.json()

  if(!data.email){
    alert("Error creando email")
    return
  }

  currentEmail = data.email
  document.getElementById("email").innerText = currentEmail

  startInbox()
}

function startInbox(){
  if(interval) clearInterval(interval)
  loadInbox()
  interval = setInterval(loadInbox, 4000)
}

async function loadInbox(){
  if(!currentEmail) return

  const res = await fetch(API + "/api/inbox/" + currentEmail)
  const data = await res.json()

  renderInbox(data.messages || [])
}

function renderInbox(messages){
  if(!messages.length){
    document.getElementById("inbox").innerHTML = "<p>No messages</p>"
    return
  }

  let html = ""

  messages.forEach(m=>{
    html += `
      <div class="mail">
        <b>From:</b> ${m.from_address || "unknown"}<br>
        <b>Subject:</b> ${m.subject || ""}<br>
        <p>${m.body || ""}</p>
      </div>
    `
  })

  document.getElementById("inbox").innerHTML = html
}

async function searchMessages(){
  let q = document.getElementById("searchBox").value
  if(!q || !currentEmail){
    loadInbox()
    return
  }

  const res = await fetch(API + `/api/search/${currentEmail}/${q}`)
  const data = await res.json()

  renderInbox(data.results || [])
}

async function deleteEmail(){
  if(!currentEmail) return

  await fetch(API + "/api/delete/" + currentEmail, {method:"DELETE"})

  currentEmail = ""
  document.getElementById("email").innerText = "None"
  document.getElementById("inbox").innerHTML = ""
  document.getElementById("stats").innerHTML = ""
}

async function loadStats(){
  const res = await fetch(API + "/api/stats")
  const data = await res.json()

  document.getElementById("stats").innerHTML = `
    <div>Total cuentas: ${data.total_accounts}</div>
    <div>Total mensajes: ${data.total_messages}</div>
  `
}

</script>

</body>
</html>
