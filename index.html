<!DOCTYPE html>
<html>
<head>
    <title>TempMail PRO</title>
</head>
<body style="font-family:Arial">

<h2>🔥 TempMail Generator</h2>

<input id="name" placeholder="nombre base">
<button onclick="create()">Crear correo</button>

<hr>

<h3>Email:</h3>
<p id="email"></p>

<h3>Token:</h3>
<p id="token"></p>

<button onclick="load()">Ver mensajes</button>

<pre id="messages"></pre>

<script>

let TOKEN = "";

async function create(){

    let name = document.getElementById("name").value;

    let res = await fetch("http://localhost:8000/api/create", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name})
    });

    let data = await res.json();

    document.getElementById("email").innerText = data.email;
    document.getElementById("token").innerText = data.token;

    TOKEN = data.token;
}

async function load(){

    let res = await fetch("http://localhost:8000/api/messages/" + TOKEN);
    let data = await res.json();

    document.getElementById("messages").innerText =
        JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
