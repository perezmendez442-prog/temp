<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TempMail Real</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.header {
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.container {
    display:flex;
    gap:20px;
    padding:20px;
}

.left, .right {
    background:#1a1a1a;
    padding:15px;
    border-radius:10px;
}

.left { width:30%; }
.right { width:70%; }

button {
    width:100%;
    padding:10px;
    background:#2563eb;
    border:none;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

.email {
    background:black;
    padding:10px;
    margin-top:10px;
    word-break:break-all;
}

.msg {
    background:black;
    padding:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">📧 TempMail Pro System</div>

<div class="container">

<div class="left">

<select id="duration">
<option value="1h">1h</option>
<option value="1d">1d</option>
<option value="1w">1w</option>
<option value="1m">1m</option>
<option value="6m">6m</option>
</select>

<button onclick="createEmail()">Crear correo</button>

<div class="email" id="email">---</div>

</div>

<div class="right">
<h3>Inbox</h3>
<div id="inbox">Sin mensajes</div>
</div>

</div>

<script>

let token = null;

async function createEmail() {

    const res = await fetch("/api/create", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            duration: document.getElementById("duration").value
        })
    });

    const data = await res.json();

    document.getElementById("email").innerText = data.email;

    token = data.token;

    loadInbox();

    setInterval(loadInbox, 4000);
}

async function loadInbox() {

    if(!token) return;

    const res = await fetch("/api/messages/" + token);
    const data = await res.json();

    if(!data.messages.length){
        document.getElementById("inbox").innerHTML = "Sin mensajes";
        return;
    }

    let html = "";

    data.messages.forEach(m => {
        html += `
        <div class="msg">
            <b>${m.subject || "Sin asunto"}</b><br>
            ${m.body || ""}
        </div>`;
    });

    document.getElementById("inbox").innerHTML = html;
}

</script>

</body>
</html>
