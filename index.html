<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TempMail Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    padding: 30px;
}

.container {
    width: 500px;
    background: #111827;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
}

.row {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

input, select {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    padding: 12px;
    background: #2563eb;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.email-box {
    margin-top: 20px;
    background: #1f2937;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.inbox {
    margin-top: 15px;
    max-height: 350px;
    overflow-y: auto;
}

.msg {
    background: #1f2937;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}

.small {
    font-size: 12px;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">

<h2>📧 TempMail Pro</h2>

<!-- CREAR CORREO -->
<div class="row">
    <select id="duration">
        <option value="1h">1 Hora</option>
        <option value="1d">1 Día</option>
        <option value="1w">1 Semana</option>
        <option value="1m">1 Mes</option>
        <option value="6m">6 Meses</option>
    </select>

    <button onclick="createEmail()">Crear correo</button>
</div>

<!-- EMAIL GENERADO -->
<div id="emailBox" class="email-box" style="display:none;">
    <span id="emailText"></span>
    <button onclick="copyEmail()" style="width:auto;">Copiar</button>
</div>

<!-- INBOX -->
<div class="inbox" id="inbox"></div>

</div>

<script>

let currentEmail = "";
let token = "";

// ======================
// CREAR EMAIL
// ======================
async function createEmail() {

    const duration = document.getElementById("duration").value;

    const res = await fetch("https://TU-BACKEND.onrender.com/api/create", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ duration })
    });

    const data = await res.json();

    currentEmail = data.email;
    token = data.token;

    document.getElementById("emailText").innerText = currentEmail;
    document.getElementById("emailBox").style.display = "flex";

    loadInbox();
    setInterval(loadInbox, 5000);
}

// ======================
// COPIAR EMAIL
// ======================
function copyEmail() {
    navigator.clipboard.writeText(currentEmail);
    alert("Copiado");
}

// ======================
// INBOX
// ======================
async function loadInbox() {

    if (!currentEmail) return;

    const res = await fetch(`https://TU-BACKEND.onrender.com/api/messages/${token}`);
    const data = await res.json();

    const inbox = document.getElementById("inbox");
    inbox.innerHTML = "";

    if (!data.messages || data.messages.length === 0) {
        inbox.innerHTML = "<p class='small'>📭 Sin mensajes aún...</p>";
        return;
    }

    data.messages.forEach(msg => {

        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `
            <b>${msg.subject || "Sin asunto"}</b><br>
            <span class="small">De: ${msg.from_address}</span><br><br>
            ${msg.body || ""}
        `;

        inbox.appendChild(div);
    });
}

</script>

</body>
</html>
